# ============================================================
# SMS Forwarder - Bark 推送配置文件
# ============================================================
# 模块首次安装时会将此文件复制到 /data/adb/sms_forwarder/bark.conf
# 后续修改请直接编辑 /data/adb/sms_forwarder/bark.conf
# 模块更新不会覆盖已有配置
# ============================================================

# ----------------------------------------------------------
# Bark 推送地址（必填）
# 每行一个完整 URL，支持多个地址同时推送
# 格式: https://api.day.app/你的KEY
# 以 # 开头的行为注释，空行会被忽略
# ----------------------------------------------------------
BARK_URLS=(
    # https://api.day.app/xxxxxxxxxxxxxxxxxxxxxxx
    # https://bark.example.com/xxxxxxxxxxxxxxxxxxxxxxx
)

# ----------------------------------------------------------
# 功能开关
# ----------------------------------------------------------

# 是否转发短信通知 (true / false)
FORWARD_SMS=true

# 是否转发来电通知 (true / false)
FORWARD_CALL=true

# 是否查询来电号码归属地 (true / false)
# 需要网络连接，查询失败时自动跳过
LOOKUP_LOCATION=true

# ----------------------------------------------------------
# 监控模式与性能
# ----------------------------------------------------------

# 监控模式:
#   auto  - 自动检测：优先使用 content observe 事件驱动，失败时降级为轮询
#   event - 强制事件驱动模式（通过 content observe 实时监听数据库变化）
#   poll  - 强制轮询模式（每隔固定时间查询一次）
MONITOR_MODE=auto

# 轮询间隔，单位：秒（仅在 poll 模式下生效，建议 3~10）
POLL_INTERVAL=5

# 事件触发后的延迟，单位：秒
# content observe 可能在数据写入前就触发，加一小段延迟确保数据就绪
EVENT_DELAY_SMS=1

# 来电响铃检测间隔，单位：秒（通过 dumpsys telephony.registry 轮询）
# 值越小检测越快，建议 1~3
CALL_RING_POLL=2

# 网络请求超时，单位：秒
HTTP_TIMEOUT=10

# 发送失败重试次数
MAX_RETRIES=3

# 重试间隔基数，单位：秒（实际间隔 = 基数 * 重试次数）
RETRY_BACKOFF=2

# ----------------------------------------------------------
# Bark 消息参数
# ----------------------------------------------------------

# 消息分组名（iOS 通知中心按此分组）
BARK_GROUP=SMSForwarder

# 推送铃声（参考 Bark App 内置铃声列表）
BARK_SOUND=minuet

# 消息图标 URL（可选，留空使用默认图标）
BARK_ICON=

# 是否设为时效性通知（直接亮屏展示）
BARK_LEVEL=timeSensitive

# ----------------------------------------------------------
# 日志设置
# ----------------------------------------------------------

# 日志级别: DEBUG / INFO / WARN / ERROR
LOG_LEVEL=INFO

# 日志文件最大行数（超出后自动轮转）
LOG_MAX_LINES=2000
